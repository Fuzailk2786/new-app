<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Journey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- ✅ CSS FILES (THIS WAS THE ISSUE) -->
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/components.css">
<script src="js/app.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">🌙 My Journey</div>
</div>

<div style="padding:16px; display:flex; flex-direction:column; gap:16px;">

  <!-- QUEST HEADER CARD -->
  <div class="card" style="text-align:center;">
    <h2>30 Day Qur’an Journey</h2>

    <!-- Progress Circle -->
    <div class="progress-circle">
      <span id="dayCount">1</span>/30
    </div>

    <p class="card-sub">Build your daily habit with Qur’an & learning</p>
  </div>

  <!-- TODAY TASKS -->
  <div class="card">
    <h3>✅ Today’s Tasks</h3>

    <div class="task-row" id="quranTask">
      <span>📖 Read Today’s Qur’an</span>
      <span class="task-status">❌</span>
    </div>

    <div class="task-row" id="quizTask">
      <span>❓ Complete Daily Quiz</span>
      <span class="task-status">❌</span>
    </div>
  </div>

  <!-- REWARDS -->
  <div class="card">
    <h3>🎁 Rewards</h3>
    <p>+10 XP for today</p>
    <p>🏅 Badge at Day 7</p>
    <p>🏆 Special Reward at Day 30</p>
  </div>

  <!-- ACTION BUTTON -->
  <div class="card" style="text-align:center;">
    <button class="btn-primary" onclick="completeToday()">
      ✅ Mark Today Complete
    </button>
  </div>

</div>

</body>
</html>
